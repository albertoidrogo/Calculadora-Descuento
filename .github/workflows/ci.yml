name: CI - Avana Home Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Ejecutar Tests con pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests
        run: |
          mkdir -p reports
          python -m pytest Test/ -v --html=reports/test_report.html --self-contained-html

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-tests-html
          path: reports/
          retention-days: 30